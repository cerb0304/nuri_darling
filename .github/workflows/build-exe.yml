name: Build NURI EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller groq google-genai edge-tts vosk pyautogui aiohttp aiogram python-dotenv PyQt5 sounddevice scipy

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name=NURI --add-data="ai_engine.py;." --add-data="memory_module.py;." --add-data="identity_engine.py;." --add-data="voice_engine.py;." --add-data="keyboard_module.py;." --add-data="telegram_module.py;." --add-data="permissions.py;." --collect-all=groq --collect-all=google --collect-all=aiogram --collect-all=edge_tts --collect-all=vosk --collect-all=aiohttp --collect-all=dotenv app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: NURI-exe
          path: dist/NURI.exe
