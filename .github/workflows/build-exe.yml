name: Build NURI EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - run: python build_exe.py
      - uses: actions/upload-artifact@v4
        with:
          name: NURI-Windows
          path: dist/NURI.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - run: python build_exe.py
      - uses: actions/upload-artifact@v4
        with:
          name: NURI-Linux
          path: dist/NURI

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - run: python build_exe.py
      - uses: actions/upload-artifact@v4
        with:
          name: NURI-macOS
          path: dist/NURI
