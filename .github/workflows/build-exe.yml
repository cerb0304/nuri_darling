name: Build NURI EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller groq google-genai edge-tts vosk pyautogui aiohttp aiogram python-dotenv PyQt5 sounddevice scipy

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name=NURI --hidden-import=ai_engine --hidden-import=memory_module --hidden-import=identity_engine --hidden-import=voice_engine --hidden-import=keyboard_module --hidden-import=telegram_module --hidden-import=permissions --collect-all=groq --collect-all=aiogram --collect-all=edge_tts --collect-all=vosk app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: NURI-exe
          path: dist/NURI.exe
